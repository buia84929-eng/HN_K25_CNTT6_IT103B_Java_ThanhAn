<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Quản Lý Nhân Viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Quản Lý Nhân Viên</h1>
        </header>

        <section class="form-section">
            <form>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Họ và tên <span class="required">*</span></label>
                        <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" />
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="vd: ten@gmail.com" />
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Ngày sinh <span class="required">*</span></label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" />
                    </div>

                    <div class="form-group">
                        <label for="position">Chức vụ <span class="required">*</span></label>
                        <select id="position" name="position">
                            <option value="">-- Chọn chức vụ --</option>
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Trưởng nhóm">Trưởng nhóm</option>
                            <option value="Trưởng phòng">Trưởng phòng</option>
                            <option value="Giám đốc">Giám đốc</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Thêm Nhân Viên</button>
                    <button type="reset" class="btn btn-secondary">Nhập Lại</button>
                </div>
            </form>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h2>Danh Sách Nhân Viên</h2>
                <span class="badge">3 nhân viên</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ và tên</th>
                            <th>Email</th>
                            <th>Ngày sinh</th>
                            <th>Chức vụ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Nguyễn Văn A</td>
                            <td>a.nguyen@example.com</td>
                            <td>01/01/1995</td>
                            <td>Nhân viên</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Trần Thị B</td>
                            <td>b.tran@example.com</td>
                            <td>12/03/1993</td>
                            <td>Trưởng nhóm</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Lê Văn C</td>
                            <td>c.le@example.com</td>
                            <td>20/07/1990</td>
                            <td>Trưởng phòng</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="footer">
            <span>Tổng số nhân viên: 3</span>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        let employees = [];
        let isUpdate = null;


        const employeeForm = document.getElementById("employeeForm"); // Form tổng
        const inputName = document.getElementById("name");
        const inputEmail = document.getElementById("email");
        const inputDob = document.getElementById("dob");
        const tableBody = document.getElementById("tableBody");
        const totalEmployees = document.getElementById("totalEmployees");
        const formTitle = document.getElementById("formTitle");
        const btnSubmit = document.getElementById("btnSubmit");
        const btnCancel = document.getElementById("btnCancel");


        const renderData = () => {
            tableBody.innerHTML = "";
            employees.forEach((emp, index) => {
                const d = new Date(emp.dob);
                const dateStr = [
                    String(d.getDate()).padStart(2, '0'),
                    String(d.getMonth() + 1).padStart(2, '0'),
                    d.getFullYear()
                ].join('/');

                const tr = document.createElement("tr");
                tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${emp.name}</td>
            <td>${emp.email}</td>
            <td>${dateStr}</td>
            <td>
                <button onclick="handleEdit('${emp.id}')">Sửa</button>
                <button onclick="handleDelete('${emp.id}', '${emp.name}')">Xóa</button>
            </td>
        `;
                tableBody.appendChild(tr);
            });
            totalEmployees.innerText = employees.length;
        };

        const validate = (name, email, dob) => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!name || !email || !dob) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return false;
            }
            if (!emailRegex.test(email)) {
                alert("Email không đúng định dạng!");
                return false;
            }
            return true;
        };

        const handleSubmit = (e) => {
            e.preventDefault();
            const name = inputName.value;
            const email = inputEmail.value;
            const dob = inputDob.value;

            if (!validate(name, email, dob)) return;

            if (isUpdate === null) {

                employees.push({ id: Date.now().toString(), name, email, dob });
            } else {

                let index = employees.findIndex(emp => emp.id === isUpdate);
                employees[index] = { ...employees[index], name, email, dob };
                resetForm();
            }

            employeeForm.reset();
            renderData();
        };


        const handleEdit = (id) => {
            const emp = employees.find(e => e.id === id);
            inputName.value = emp.name;
            inputEmail.value = emp.email;
            inputDob.value = emp.dob;

            isUpdate = id;
            formTitle.innerText = "Chỉnh Sửa Nhân Viên";
            btnSubmit.innerText = "Cập Nhật";
            btnCancel.style.display = "inline";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };


        const handleDelete = (id, name) => {
            if (confirm(`Bạn có chắc muốn xóa nhân viên ${name}?`)) {
                const index = employees.findIndex(e => e.id === id);
                employees.splice(index, 1);

                if (isUpdate === id) resetForm();

                renderData();
            }
        };


        const resetForm = () => {
            isUpdate = null;
            employeeForm.reset();
            formTitle.innerText = "Thêm Nhân Viên Mới";
            btnSubmit.innerText = "Thêm Nhân Viên";
            btnCancel.style.display = "none";
        };


        employeeForm.addEventListener("submit", handleSubmit);
        btnCancel.addEventListener("click", resetForm);


        renderData();

    </script>
</body>

</html>
